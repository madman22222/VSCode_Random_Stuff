name: Python tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chess/requirements.txt
          pip install coverage
      - name: Generate metrics sample
        run: |
          python chess/generate_metrics_sample.py
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-sample-${{ matrix.python-version }}
          path: metrics_sample.csv
      - name: Run tests with coverage (discovery)
        run: |
          C:/Users/buggu/Documents/GitHub/VSCode_Random_Stuff/.venv/Scripts/python.exe -m coverage run -m unittest discover -v chess/tests
      - name: Run explicit test modules (fallback)
        run: |
          C:/Users/buggu/Documents/GitHub/VSCode_Random_Stuff/.venv/Scripts/python.exe -m coverage run -a -m unittest -v chess.tests.test_game_controller chess.tests.test_special_moves
      - name: Generate coverage reports
        run: |
          coverage xml || true
          coverage html || true
          coverage report -m > coverage.txt || true
      - name: Save test output & coverage summary
        run: |
          python -m unittest -v chess.tests.test_game_controller chess.tests.test_special_moves > test-results.txt 2>&1 || true
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov
            coverage.txt
      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.txt
