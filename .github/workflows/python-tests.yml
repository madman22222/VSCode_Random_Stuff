name: Python tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chess/requirements.txt
      - name: Generate metrics sample
        run: |
          python chess/generate_metrics_sample.py
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-sample-${{ matrix.python-version }}
          path: metrics_sample.csv
      - name: Run unit tests
        run: |
          python -m unittest discover -v chess/tests || true
      - name: Fallback explicit test modules
        run: |
          python -m unittest -v chess.tests.test_game_controller chess.tests.test_special_moves || true
